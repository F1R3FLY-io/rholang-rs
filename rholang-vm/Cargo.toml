[package]
name = "rholang-vm"
version = "0.2.0"
edition = "2021"
description = "New Rholang VM (from scratch) based on rholang-bytecode"

[dependencies]
anyhow = { workspace = true }
tokio = { workspace = true }
rholang-bytecode = { path = "../rholang-bytecode" }
crossbeam = { version = "0.8", optional = true }
num_cpus = { version = "1", optional = true }
pathmap = { git = "https://github.com/adam-Vandervorst/pathMap", optional = true }

[lib]
name = "rholang_vm"
path = "src/lib.rs"

[features]
default = ["parallel-exec", "process-space", "rspace-pathmap"]
parallel-exec = ["crossbeam", "num_cpus"]
process-space = ["pathmap"]
rspace-pathmap = ["pathmap"]
rspace-inmemory = []